name = "docker-hub-proxy"
main = "src/index.js"
compatibility_date = "2025-07-22"

# 绑定自定义域名（国内必须，*.workers.dev 被墙）
[[routes]]
pattern = "docker.cd.run"
custom_domain = true

# 可选：在此覆盖代码里的 DEFAULT_WORKERS_URL
# [vars]
# WORKERS_URL = "https://docker.cd.run"

# 可选：全局 Docker Hub 认证（解决未认证拉取速率限制）
# 在 Cloudflare Dashboard 中配置以下 secrets：
#   DOCKER_HUB_USERNAME: Docker Hub 用户名
#   DOCKER_HUB_TOKEN: Docker Hub 访问令牌（推荐使用个人访问令牌而非密码）

# 推荐：IP 白名单（私有化代理，防止公开代理被滥用封号）
# 在 Cloudflare Dashboard 中配置 secret：
#   ALLOWED_IPS: 允许访问的 IP 列表，逗号分隔（如 "1.2.3.4,5.6.7.8"）
# 未配置时不启用白名单（公开模式）
